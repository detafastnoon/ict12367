{% extends 'base.html' %} {% block content %}
    <style>
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 320px; margin: 50px auto; }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background-color: #28a745; color: white; border: none; padding: 12px; margin-top: 25px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
    </style>

    <div class="card">
        <h2>บันทึกข้อมูลพนักงาน</h2>
        <form method="POST">
            {% csrf_token %} <label>Full Name</label> <input type="text" name="fullname">
            <label>Email</label> <input type="email" name="email">
            <label>Position</label>
            <select name="position">
                <option>Manager</option>
                <option>Developer</option>
                <option>Staff</option>
            </select>
            <label>Phone Number</label> <input type="text" name="phone">
            <button type="submit">Submit</button>
        </form>
    </div>
{% endblock %}
