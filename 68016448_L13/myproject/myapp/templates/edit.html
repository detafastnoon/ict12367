{% extends "base.html" %}

{% block content %}
<div class="card" style="width: 500px; margin: 50px auto; border: 1px solid #e0e0e0; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif;">
    
    <div style="background-color: #007bff; color: white; padding: 15px; text-align: center; font-size: 24px; font-weight: bold;">
        แบบฟอร์มแก้ไขข้อมูล
    </div>

    <div style="padding: 25px; background-color: #ffffff;">
        <form method="post"> 
            {% csrf_token %}
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #333;">ชื่อประชากร</label>
                <input type="text" name="name" value="{{ person.name }}" 
                       style="width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box;" required>
            </div>

            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #333;">อายุ</label>
                <input type="number" name="age" value="{{ person.age }}" 
                       style="width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box;" required>
            </div>

            <div style="display: flex; justify-content: center; gap: 15px;">
                <button type="submit" style="background-color: #d63384; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold;">
                    อัพเดตข้อมูล
                </button>
                <a href="/" style="background-color: #fd7e14; color: white; text-decoration: none; padding: 10px 25px; border-radius: 6px; display: inline-block; font-size: 16px; font-weight: bold;">
                    ยกเลิก
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
