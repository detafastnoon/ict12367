{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="text-center mb-4">
        <ul class="nav justify-content-center"> 
            <li class="nav-item"><a href="{% url 'index' %}" class="nav-link">หน้าแรก</a></li>
            <li class="nav-item"><a href="{% url 'form' %}" class="nav-link">บริการ (Form)</a></li>
        </ul>
    </div>

    <h2 style="color: #6f42c1; font-weight: bold; margin-bottom: 20px;">ยินดีต้อนรับเข้าสู่ประชากร</h2>

    <div class="custom-grid">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th scope="col">รหัสประชากร</th>
                    <th scope="col">ชื่อประชากร</th>
                    <th scope="col">อายุ</th>
                    <th scope="col" class="text-center">แก้ไข</th>
                    <th scope="col" class="text-center">ลบ</th>
                </tr>
            </thead>
            <tbody>
                {% for person in all_person %}
                <tr>
                    <th scope="row">{{ person.id }}</th> 
                    <td>{{ person.name }}</td> 
                    <td>{{ person.age }}</td>
                    <td class="text-center">
                        <a href="#" class="btn btn-warning btn-sm px-4">แก้ไข</a>
                    </td>
                    <td class="text-center">
                        <a href="#" class="btn btn-danger btn-sm px-4">ลบ</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
